# ============================================================
# SMALL ACCOUNT PROFILE — tuned for a $90-100 budget.
# Run with:  python run_live.py --mode demo --config config.small.yaml
#            python run_backtest.py --synthetic --config config.small.yaml
#
# What changes vs the default config and why:
#  - risk_per_trade_pct 1.0 (= $1/trade): keeps position sizes around
#    $30-50, so orders AND the 30% partial exits stay above the
#    exchange's ~$5 minimum order size.
#  - max_open_positions 2: $100 of cash can genuinely fund ~2 unleveraged
#    positions; more slots would just be dead config.
#  - Everything else (12-pair scan, 2h timeframe, cost gate, vol
#    targeting, daily pause, kill switch) is inherited unchanged: the
#    bot still WATCHES all 12 pairs and takes the best 2 setups.
#
# Dollar translation of the risk rules at a $100 budget:
#   per trade risk   : $1
#   daily loss pause : -$3  -> no new trades until tomorrow (UTC)
#   kill switch      : -$10 -> bot stops entirely, manual reset required
# ============================================================

exchange:
  exchange_id: binance
  testnet: true             # keep true until the demo period is over
  symbols:                  # 16 pairs: widening 12 -> 16 raised measured
    - BTC/USDT              # PnL +2.11%/30d -> +2.34%/30d WITH a higher win
    - ETH/USDT              # rate and milder worst case (diversification is
    - SOL/USDT              # the one free lunch). If a pair isn't listed on
    - BNB/USDT              # your testnet, the bot logs the failed fetch and
    - XRP/USDT              # skips it — no harm done.
    - ADA/USDT
    - DOGE/USDT
    - AVAX/USDT
    - LINK/USDT
    - DOT/USDT
    - LTC/USDT
    - NEAR/USDT
    - UNI/USDT
    - ATOM/USDT
    - FIL/USDT
    - TRX/USDT
  timeframe: 4h             # measured best for small accounts: ~3 trades/
                            # week at nearly double the expectancy of 2h
                            # (marginal trades were only feeding fees)

risk:
  allocated_budget: 100
  risk_per_trade_pct: 1.0
  max_total_risk_pct: 10
  max_drawdown_pct: 10
  daily_loss_pause_pct: 3
  vol_target_atr_pct: 0.6
  min_stop_cost_mult: 5
  min_order_notional: 6
  max_open_positions: 2
  fee_pct: 0.10             # FREE PnL: hold a little BNB and enable "Pay
                            # fees with BNB" on your Binance account, then
                            # set this to 0.075 to match. Measured effect:
                            # ~+0.1%/30d and a softer worst case for zero
                            # added risk.
  slippage_pct: 0.05

strategy:
  ema_fast: 21
  ema_slow: 55
  atr_period: 14
  rsi_period: 14
  swing_left: 3
  swing_right: 3
  structure_lookback: 120
  zone_cluster_atr_mult: 0.5
  zone_touch_atr_mult: 0.25
  min_pattern_score: 0.60  # stricter than the default 0.45: with only ~3
                           # trades/week, every entry must earn its place
  rsi_long_max: 70
  rsi_short_min: 30
  stop_atr_buffer: 0.5
  max_stop_atr_mult: 3.0
  partial_take_r: 1.0
  partial_take_fraction: 0.3
  breakeven_at_r: 1.0
  trail_atr_mult: 3.5
  trail_tighten_after_r: null  # two-stage trail measured WORSE - keep off
  target_r: null
  allow_shorts: false
  cooldown_bars: 3
