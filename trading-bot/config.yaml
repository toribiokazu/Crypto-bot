# ============================================================
# Trading bot configuration
# Risk ceilings (10% total open risk, 10% drawdown kill switch)
# are HARD-CODED maximums — values above them are rejected.
# ============================================================

exchange:
  exchange_id: binance      # any ccxt exchange id (binance, bybit, kraken...)
  testnet: true             # keep true until the demo period is over
  symbols:                  # portfolio: one shared budget across all pairs
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - XRP/USDT
    - ADA/USDT
    - DOGE/USDT
    - AVAX/USDT
    - LINK/USDT
    - DOT/USDT
    - LTC/USDT
    - NEAR/USDT
  timeframe: 2h             # the measured sweet spot. Faster charts trade
                            # more but LOSE money at retail fees: in our sims
                            # 15m was -10%/month with every run kill-switched.
                            # Frequency comes from breadth (12 pairs), not
                            # from a faster chart.

risk:
  allocated_budget: 1000    # money the bot manages (demo funds while testing)
  risk_per_trade_pct: 0.75  # smaller per-trade risk at higher frequency:
                            # ~13 losing trades in a row to hit the kill switch
  max_total_risk_pct: 10    # hard cap on combined open risk (max 10)
  max_drawdown_pct: 10      # kill switch: stop trading at -10% (max 10)
  daily_loss_pause_pct: 3   # lose 3% of budget in one UTC day -> no new
                            # trades until tomorrow (a bad day can't snowball)
  vol_target_atr_pct: 0.6   # institutional-style vol targeting: full risk
                            # when ATR <= 0.6% of price, scaled down above
  min_stop_cost_mult: 5     # cost-aware gate: reject setups whose stop is
                            # tighter than 5x the round-trip fees+slippage
                            # (this is what makes fast timeframes unprofitable)
  max_open_positions: 6     # one per symbol, at most this many at once
  fee_pct: 0.10             # taker fee per side
  slippage_pct: 0.05

strategy:
  ema_fast: 21
  ema_slow: 55
  atr_period: 14
  rsi_period: 14
  swing_left: 3
  swing_right: 3
  structure_lookback: 120
  zone_cluster_atr_mult: 0.5
  zone_touch_atr_mult: 0.25
  min_pattern_score: 0.45
  rsi_long_max: 70
  rsi_short_min: 30
  stop_atr_buffer: 0.5
  max_stop_atr_mult: 3.0
  # --- exits: ~48% win rate, best-measured PnL profile ---
  # 30% of the position is banked at +1R (that locks the trade as a win
  # and moves the stop to breakeven); the remaining 70% trails a 3.5*ATR
  # stop so trend winners stay big. In regime sims this beat both the
  # full-2R-target profile and every higher-win-rate variant on PnL
  # while keeping the win rate near 48% (floor requirement: 40%).
  partial_take_r: 1.0
  partial_take_fraction: 0.3
  breakeven_at_r: 1.0       # stop -> entry once the trade is +1R
  trail_atr_mult: 3.5       # trail for the runner
  target_r: null            # no hard cap on the runner - let it run
                            # (set e.g. 2.0 to force a fixed +2R exit)
  allow_shorts: false       # spot demo accounts are long-only
  cooldown_bars: 3
